<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Help Desk Ticket System</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>Help Desk Ticket System</h1>
        <p class="subtitle">Log and track basic IT support tickets</p>

        <form id="ticketForm" class="ticket-form">
            <input type="text" id="userName" placeholder="User Name" required />

            <select id="issueType" required>
                <option value="">Select Issue Type</option>
                <option value="Password Reset">Password Reset</option>
                <option value="WiFi Issue">WiFi Issue</option>
                <option value="Software Installation">Software Installation</option>
                <option value="Printer Problem">Printer Problem</option>
                <option value="Email Access">Email Access</option>
                <option value="Other">Other</option>
            </select>

            <textarea id="description" placeholder="Describe the issue" required></textarea>
            <textarea id="stepsTaken" placeholder="Troubleshooting steps taken"></textarea>

            <button type="submit">Create Ticket</button>
        </form>

        <h2>Open Tickets</h2>
        <div id="ticketList" class="ticket-list"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
